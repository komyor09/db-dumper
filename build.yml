name: Build — Windows · macOS · Linux

on:
  push:
    tags:
      - "v*"          # срабатывает на git tag v1.0, v1.2.3 и т.д.
  workflow_dispatch:  # ручной запуск из GitHub UI (кнопка Run workflow)

jobs:

# ─────────────────────────────────────────────────────────────
#  WINDOWS  →  db_dump_gui.exe
# ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller pillow --quiet

      - name: Convert icon.png → icon.ico
        shell: python
        run: |
          import os
          if os.path.exists("icon.png"):
              from PIL import Image
              img = Image.open("icon.png")
              img.save("icon.ico", format="ICO",
                       sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
              print("icon.ico created")
          else:
              print("icon.png not found, skipping")

      - name: Build EXE
        shell: cmd
        run: |
          if exist icon.ico (
            pyinstaller --onefile --windowed --name db_dump_gui ^
              --add-data "db_dump.py;." ^
              --hidden-import tkinter ^
              --hidden-import tkinter.ttk ^
              --hidden-import tkinter.filedialog ^
              --hidden-import tkinter.messagebox ^
              --icon=icon.ico ^
              db_dump_gui.py
          ) else (
            pyinstaller --onefile --windowed --name db_dump_gui ^
              --add-data "db_dump.py;." ^
              --hidden-import tkinter ^
              --hidden-import tkinter.ttk ^
              --hidden-import tkinter.filedialog ^
              --hidden-import tkinter.messagebox ^
              db_dump_gui.py
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db_dump_gui-windows
          path: dist/db_dump_gui.exe

# ─────────────────────────────────────────────────────────────
#  macOS  →  db_dump_gui (Mach-O binary)
# ─────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller --quiet

      - name: Convert icon.png → icon.icns
        run: |
          if [ -f "icon.png" ]; then
            mkdir -p icon.iconset
            for SIZE in 16 32 64 128 256 512; do
              sips -z $SIZE $SIZE icon.png \
                --out "icon.iconset/icon_${SIZE}x${SIZE}.png"       &>/dev/null
              sips -z $((SIZE*2)) $((SIZE*2)) icon.png \
                --out "icon.iconset/icon_${SIZE}x${SIZE}@2x.png"    &>/dev/null
            done
            iconutil -c icns icon.iconset -o icon.icns
            rm -rf icon.iconset
            echo "icon.icns created"
          else
            echo "icon.png not found, skipping"
          fi

      - name: Build macOS binary
        run: |
          ICON_FLAG=""
          [ -f "icon.icns" ] && ICON_FLAG="--icon=icon.icns"
          python -m PyInstaller \
            --onefile \
            --windowed \
            --name db_dump_gui \
            --add-data "db_dump.py:." \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            $ICON_FLAG \
            db_dump_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db_dump_gui-macos
          path: dist/db_dump_gui

# ─────────────────────────────────────────────────────────────
#  LINUX  →  db_dump_gui (ELF binary)
# ─────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (tkinter)
        run: sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: pip install pyinstaller --quiet

      - name: Build Linux binary
        run: |
          ICON_FLAG=""
          [ -f "icon.png" ] && ICON_FLAG="--icon=icon.png"
          python -m PyInstaller \
            --onefile \
            --windowed \
            --name db_dump_gui \
            --add-data "db_dump.py:." \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            $ICON_FLAG \
            db_dump_gui.py
          chmod +x dist/db_dump_gui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db_dump_gui-linux
          path: dist/db_dump_gui

# ─────────────────────────────────────────────────────────────
#  RELEASE  →  прикрепляет все 3 файла к GitHub Release
#  Запускается только при git tag v*
# ─────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries
        run: |
          mv artifacts/db_dump_gui-windows/db_dump_gui.exe  artifacts/db_dump_gui-windows.exe
          mv artifacts/db_dump_gui-macos/db_dump_gui        artifacts/db_dump_gui-macos
          mv artifacts/db_dump_gui-linux/db_dump_gui        artifacts/db_dump_gui-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/db_dump_gui-windows.exe
            artifacts/db_dump_gui-macos
            artifacts/db_dump_gui-linux
          body: |
            ## db_dump GUI

            | Платформа | Файл |
            |-----------|------|
            | Windows   | `db_dump_gui-windows.exe` |
            | macOS     | `db_dump_gui-macos` |
            | Linux     | `db_dump_gui-linux` |

            > Положи рядом с бинарником файл `db_dump.py`
